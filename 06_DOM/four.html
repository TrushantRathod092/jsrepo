<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>
    <style>
        body{
            background-color: #212121;
            color: #fff;
        }
    </style>
</head>
<body>
    <ul class="language">
        <li>Javascript</li>
    </ul>
</body>
<script>
    function addLang(lang){
        const li = document.createElement('li')
        li.innerHTML = `${lang}`

        document.querySelector('.language').appendChild(li)
    }
    addLang('Python')
    addLang('TypeScript')

    function addOptiLanguage(lang){
        const li = document.createElement('li')
        li.appendChild(document.createTextNode(lang))
        document.querySelector('.language').appendChild(li)
    }
    addOptiLanguage('C++')
    addOptiLanguage('Java')

    //Edit

    const secondLang = document.querySelector("li:nth-child(2)")
    console.log("Replaced 1: ", secondLang);
    // 1 :
    // secondLang.innerHTML = 'React'
    // 2 :
    const newli = document.createElement('li')
    newli.textContent = 'React'
    secondLang.replaceWith(newli)

    // Edit
    // 3 :
    const firstLang = document.querySelector('li:nth-child(1)')
    console.log("Replaced 2: ", firstLang);
    firstLang.outerHTML = '<li>Node.js</li>'

    // Remove
    const  lastLang = document.querySelector('li:last-child')
    console.log("Removed: ", lastLang);
    lastLang.remove()

</script>
</html>
